# =============================================================================
# CI (Continuous Integration) — GitHub Actions
# =============================================================================
# À chaque push sur la branche `main` ou à chaque ouverture / mise à jour de
# pull request, GitHub lance les vérifications suivantes :
#
#   1. lint              : ESLint signale les erreurs de qualité (sonarjs inclus)
#   2. format:check      : Prettier vérifie que tout est formaté
#   3. test              : Vitest exécute tous les tests unitaires (146 tests)
#   4. build             : tsc + vite vérifient la compilation TypeScript
#
# Si une étape échoue, le commit affiche une croix rouge sur GitHub et un mail
# est envoyé. Cela évite les régressions silencieuses.
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v6

      - name: Installer Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Installer les dépendances
        run: npm ci

      - name: Lint (ESLint + sonarjs)
        run: npm run lint

      - name: Format (Prettier check)
        run: npm run format:check

      - name: Tests unitaires (Vitest)
        run: npm run test

      - name: Build (TypeScript + Vite)
        run: npm run build
